<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Patients Directory</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header d-flex align-items-center">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h4 class="mb-0 fw-bold">CareTrack Clinic</h4>
      </div>
      
      <ul class="nav flex-column sidebar-nav mt-4">
        <li class="nav-item">
          <a class="nav-link" href="index.html">
            <i class="fa-solid fa-border-all"></i> Dashboard
          </a>
        </li>
        <li class="nav-item" id="nav-admins-link">
          <a class="nav-link" href="admins.html">
            <i class="fa-solid fa-user-shield"></i> Admins
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="doctors.html">
            <i class="fa-solid fa-user-doctor"></i> Doctors
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="patients.html">
            <i class="fa-solid fa-users"></i> Patients
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="receptionists.html">
            <i class="fa-solid fa-desktop"></i> Receptionists
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="diagnoses.html">
            <i class="fa-solid fa-stethoscope"></i> Diagnoses
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="appointments.html">
            <i class="fa-regular fa-calendar-check"></i> Appointments
          </a>
        </li>
        <li class="nav-item mt-4">
          <a class="nav-link" href="#" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket text-danger"></i> <span class="text-danger">Logout</span>
          </a>
        </li>
      </ul>

      <div class="sidebar-footer mt-auto p-3">
        <div class="userProfileTarget"></div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header -->
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">Patients Directory</h2>
        <div class="header-actions d-flex align-items-center gap-3">
          
          
          <a href="my-profile.html" class="text-light text-decoration-none d-flex align-items-center gap-2 custom-hover-effect">
            <div class="rounded-circle d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));">
              <i class="fas fa-user text-white"></i>
            </div>
          </a>
        </div>
      </header>

      <!-- Control Bar -->
      <div class="row mb-4 g-3 align-items-center">
        <div class="col-md-5">
          <input type="text" id="searchPatient" class="form-control bg-transparent text-light border-secondary rounded-pill" placeholder="Search by name or email...">
        </div>
        <div class="col-md-4">
          <select id="filterDoctor" class="form-select bg-transparent text-light border-secondary rounded-pill">
            <option value="all">All Doctors</option>
          </select>
        </div>
        <div class="col-md-3 text-end">
          <button class="btn btn-primary-gradient rounded-pill px-4 fw-semibold shadow-sm" data-bs-toggle="modal" data-bs-target="#addPatientModal">
            Add New Patient <i class="fa-solid fa-plus ms-1"></i>
          </button>
        </div>
      </div>

      <!-- Glassmorphism Table -->
      <div class="glass-table table-responsive">
        <table class="table table-borderless align-middle mb-0">
          <thead>
            <tr>
              <th>Patient Name</th>
              <th>Email</th>
              <th>DOB / Age</th>
              <th>Gender</th>
              <th>Assigned Doctor</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="patientsTableBody">
            <!-- Rows dynamically injected here -->
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Toast Container -->
  

  <!-- Custom Confirm Modal -->
  <div class="modal fade" id="customConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content glass-card border-0" style="color: var(--text-primary);">
        <div class="modal-body text-center p-4">
          <i class="fa-solid fa-triangle-exclamation text-warning fs-1 mb-3"></i>
          <h5 class="fw-bold mb-3" id="confirmModalText">Are you sure?</h5>
          <div class="d-flex justify-content-center gap-2 mt-4">
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-danger rounded-pill px-4" id="confirmModalBtn" style="background: var(--primary-gradient); border: none;">Yes, Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Patient Modal -->
  <div class="modal fade" id="addPatientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-0 shadow-lg" style="color: var(--text-primary);">
        <div class="modal-header border-bottom border-secondary border-opacity-25">
          <h5 class="modal-title fw-bold">Add New Patient</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: invert(1) grayscale(100%) brightness(200%);"></button>
        </div>
        <div class="modal-body">
          <form id="addPatientForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">First Name</label>
                <input type="text" class="form-control" id="addFirstName" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Last Name</label>
                <input type="text" class="form-control" id="addLastName" required="">
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Email</label>
                <input type="email" class="form-control" id="addEmail" required="">
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Password</label>
                <input type="password" class="form-control" id="addPassword" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Age</label>
                <input type="number" class="form-control" id="addAge" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Gender</label>
                <select class="form-select" id="addGender" style="background-color: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color);">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Assigned Doctor</label>
                <select class="form-select" id="addAssignedDoctor" style="background-color: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color);">
                  <option value="">No Assigned Doctor</option>
                  <!-- Doctors dynamically loaded here -->
                </select>
              </div>
              <div class="row mt-3 border-top border-secondary pt-3 mx-0 px-0">
                  <h6 class="text-info mb-3 px-0"><i class="fas fa-notes-medical me-2"></i>Medical Information</h6>
                  <div class="col-md-6 mb-3 ps-0">
                      <label class="form-label text-light">Blood Type</label>
                      <select class="form-select bg-dark text-light border-secondary" id="addBloodType" name="addBloodType">
                          <option value="">Select...</option>
                          <option value="A+">A+</option><option value="A-">A-</option>
                          <option value="B+">B+</option><option value="B-">B-</option>
                          <option value="AB+">AB+</option><option value="AB-">AB-</option>
                          <option value="O+">O+</option><option value="O-">O-</option>
                      </select>
                  </div>
                  <div class="col-md-6 mb-3 pe-0">
                      <label class="form-label text-light">Allergies</label>
                      <input type="text" class="form-control bg-dark text-light border-secondary" id="addAllergies" name="addAllergies" placeholder="e.g. Penicillin">
                  </div>
                  <div class="col-12 mb-3 px-0">
                      <label class="form-label text-light">Chronic Conditions</label>
                      <textarea class="form-control bg-dark text-light border-secondary" id="addChronicConditions" name="addChronicConditions" rows="2"></textarea>
                  </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer border-top border-secondary border-opacity-25">
          <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary-gradient rounded-pill px-4" id="submitAddPatientBtn">Create Patient</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Patient Modal -->
  <div class="modal fade" id="editPatientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card border-0 shadow-lg" style="color: var(--text-primary);">
        <div class="modal-header border-bottom border-secondary border-opacity-25">
          <h5 class="modal-title fw-bold">Edit Patient Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: invert(1) grayscale(100%) brightness(200%);"></button>
        </div>
        <div class="modal-body">
          <form id="editPatientForm">
            <input type="hidden" id="editPatientId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">First Name</label>
                <input type="text" class="form-control" id="editFirstName" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Last Name</label>
                <input type="text" class="form-control" id="editLastName" required="">
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Email</label>
                <input type="email" class="form-control" id="editEmail" required="">
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Password</label>
                <input type="password" class="form-control" id="editPassword" placeholder="Leave blank to keep current">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Age</label>
                <input type="number" class="form-control" id="editAge" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label" style="color: var(--text-secondary);">Gender</label>
                <select class="form-select" id="editGender" style="background-color: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color);">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" style="color: var(--text-secondary);">Assigned Doctor</label>
                <select class="form-select" id="editAssignedDoctor" style="background-color: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color);">
                  <option value="">No Assigned Doctor</option>
                  <!-- Doctors dynamically loaded here -->
                </select>
              </div>
              <div class="row mt-3 border-top border-secondary pt-3 mx-0 px-0">
                  <h6 class="text-info mb-3 px-0"><i class="fas fa-notes-medical me-2"></i>Medical Information</h6>
                  <div class="col-md-6 mb-3 ps-0">
                      <label class="form-label text-light">Blood Type</label>
                      <select class="form-select bg-dark text-light border-secondary" id="editBloodType" name="editBloodType">
                          <option value="">Select...</option>
                          <option value="A+">A+</option><option value="A-">A-</option>
                          <option value="B+">B+</option><option value="B-">B-</option>
                          <option value="AB+">AB+</option><option value="AB-">AB-</option>
                          <option value="O+">O+</option><option value="O-">O-</option>
                      </select>
                  </div>
                  <div class="col-md-6 mb-3 pe-0">
                      <label class="form-label text-light">Allergies</label>
                      <input type="text" class="form-control bg-dark text-light border-secondary" id="editAllergies" name="editAllergies" placeholder="e.g. Penicillin">
                  </div>
                  <div class="col-12 mb-3 px-0">
                      <label class="form-label text-light">Chronic Conditions</label>
                      <textarea class="form-control bg-dark text-light border-secondary" id="editChronicConditions" name="editChronicConditions" rows="2"></textarea>
                  </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer border-top border-secondary border-opacity-25">
          <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary-gradient rounded-pill px-4" id="submitEditPatientBtn">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="patients.js"></script>
  <script src="../transitions.js"></script>


<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body></html>
