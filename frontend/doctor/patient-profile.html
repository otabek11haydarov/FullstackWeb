<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Patient Profile</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  
  <style>
    :root {
      --neon-cyan: #00f5ff;
      --neon-purple: #7b2ff7;
      --neon-pink: #f107a3;
      --bg-dark: #12121a;
      --glass-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      background: radial-gradient(circle at 20% 50%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 40%),
                  var(--bg-dark);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--glass-panel);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      padding-left: 1rem;
    }

    .nav-item {
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .nav-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
    }
    
    .glass-panel {
      background: var(--glass-panel);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
    }
    
    .avatar-lg {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
    }
    
    .form-control, .form-select {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: #fff !important;
    }
    .form-control:disabled {
      background: rgba(0,0,0,0.2) !important;
      opacity: 0.6;
    }
    
    .btn-neon-cyan {
      background: rgba(0, 245, 255, 0.1);
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      border-radius: 20px;
      padding: 0.5rem 1.5rem;
      transition: all 0.3s;
    }
    .btn-neon-cyan:hover:not(:disabled) {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 15px var(--neon-cyan);
    }
    .btn-neon-cyan:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <main class="main-content">
      <div class="header">
        <div>
          <a href="my-patients.html" class="text-white-50 text-decoration-none"><i class="fa-solid fa-arrow-left me-2"></i> Back to Patients</a>
          <h3 class="mb-1 fw-bold mt-2">Patient Profile</h3>
        </div>
      </div>

      <!-- Read-Only Banner -->
      <div id="readOnlyBanner" class="alert alert-warning" style="display: none; background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; color: #ffc107;">
        <i class="fa-solid fa-lock me-2"></i> <strong>Read-only mode:</strong> No active appointment. You cannot edit this patient's profile at this time.
      </div>

      <div class="row g-4">
        <!-- Patient Info -->
        <div class="col-md-4">
          <div class="glass-panel text-center h-100">
            <div class="avatar-lg mx-auto mb-3" id="patAvatar">P</div>
            <h4 class="fw-bold" id="patName">Loading...</h4>
            <p class="text-white-50" id="patEmail">...</p>
            <hr class="border-secondary opacity-25">
            <div class="d-flex justify-content-between text-start mb-2">
              <span class="text-white-50">DOB</span>
              <span id="patDob" class="fw-medium">...</span>
            </div>
            <div class="d-flex justify-content-between text-start mb-2">
              <span class="text-white-50">Gender</span>
              <span id="patGender" class="fw-medium">...</span>
            </div>
            <div class="d-flex justify-content-between text-start">
              <span class="text-white-50">Contact</span>
              <span id="patContact" class="fw-medium">...</span>
            </div>
          </div>
        </div>

        <!-- Add Diagnosis / Medical Actions -->
        <div class="col-md-8">
          <div class="glass-panel h-100">
            <h5 class="fw-bold mb-4">Medical Actions</h5>
            
            <form id="diagnosisForm">
              <div class="mb-3">
                <label class="form-label text-white-50">New Diagnosis</label>
                <input type="text" class="form-control" id="diagCondition" placeholder="e.g. Hypertension">
              </div>
              <div class="mb-3">
                <label class="form-label text-white-50">Severity</label>
                <select class="form-select" id="diagSeverity">
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                  <option value="Critical">Critical</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label text-white-50">Notes / Treatment Plan</label>
                <textarea class="form-control" id="diagNotes" rows="3" placeholder="Enter notes here..."></textarea>
              </div>
              <button type="submit" class="btn btn-neon-cyan" id="btnSubmitDiag">Add Diagnosis</button>
            </form>
            
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
  <script src="patient-profile.js"></script>
</body>
</html>
