<!DOCTYPE html><html lang="en" data-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - My Schedule</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../global.css">
  
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="text-white min-vh-100">

  <div class="app-container">
    
    <!-- Sidebar -->
    <div class="sidebar-backdrop" id="sidebarBackdrop">
        <button class="btn text-white mobile-close-btn d-lg-none" id="mobileCloseSidebar" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; z-index: 1060;"><i class="fas fa-times"></i></button></div>
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
        <a href="my-schedule.html" class="nav-item active">
          <i class="fa-regular fa-calendar-days"></i> My Schedule
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fa-regular fa-file-lines"></i> Reports
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <button id="mobileSidebarToggle" class="btn btn-outline-info d-lg-none mb-3" style="border-radius: 8px; width: fit-content;"><i class="fas fa-bars me-2"></i> Menu</button>
      
      <!-- Top Header -->
      <div class="d-flex justify-content-between align-items-end mb-4 border-bottom border-secondary pb-3">
          <div>
              <h2 class="mb-1 text-light">My Schedule</h2>
              <p class="text-secondary mb-0" id="currentDateDisplay">Select a date to view schedule</p>
          </div>
          <div class="date-navigator d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-outline-info rounded-circle" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
              <input type="date" id="scheduleDatePicker" class="form-control form-control-sm bg-transparent text-light border-info" style="width: 140px; color-scheme: dark;">
              <button class="btn btn-sm btn-outline-info rounded-circle" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
          </div>
      </div>

      <!-- Timeline -->
      <div id="dailyTimeline" class="d-flex flex-column gap-3 pb-5">
      </div>

    </main>
  </div>

  <!-- Toast Container -->
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
  <script src="my-schedule.js?v=2.0"></script>


<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body></html>
