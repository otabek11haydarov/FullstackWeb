<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctors Management - Receptionist</title>
  
  <script src="../theme-init.js"></script>
  <link rel="icon" href="../assets/logo.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../global.css">
  
  <style>
    /* Custom Styling for the Receptionist Doctors */
    .locked-action {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(80%);
      pointer-events: none;
    }
    .active-gradient-sidebar { background: linear-gradient(90deg, #7b2ff7, #ff007f) !important; color: white !important; }
    .hover-glass:hover { background: rgba(255,255,255,0.05); color: white !important; }
  </style>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="glass-body">

  <div class="d-flex" style="height: 100vh; overflow: hidden; background-color: var(--bg-dark);">
    
    <!-- Sidebar -->
    <nav class="glass-card d-flex flex-column p-3 m-3 rounded-4" style="width: 280px; height: calc(100vh - 48px);">
        <!-- Logo & Brand Name -->
        <div class="brand-logo mb-4 d-flex align-items-center gap-3 ps-2">
            <img src="../assets/logo.png" alt="Logo" width="40" class="rounded">
            <div class="d-flex flex-column">
                <span class="fw-bold text-light">CareTrack</span>
                <span class="small text-white-50">Clinic</span>
            </div>
        </div>
        
        <!-- Navigation -->
        <ul class="nav flex-column mb-auto gap-2">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="appointments.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-calendar-check"></i> Appointments
                </a>
            </li>
            <li class="nav-item">
                <a href="doctors.html" class="nav-link text-white active-gradient-sidebar rounded-3 d-flex align-items-center gap-3">
                    <i class="fas fa-user-md"></i> Doctors
                </a>
            </li>
            <li class="nav-item">
                <a href="patients.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-users"></i> Patients
                </a>
            </li>
        </ul>

        <!-- Logout -->
        <div class="mt-auto border-top border-secondary pt-3">
            <a href="../auth/login.html" id="logoutBtn" class="nav-link text-danger fw-bold d-flex align-items-center gap-3">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1 d-flex flex-column p-3 m-3 ms-0" style="overflow-y: auto;">
      
      <!-- Top Header -->
      <header class="d-flex justify-content-between align-items-center mb-4 glass-card p-3 rounded-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">Doctors Directory</h2>
        
        <div class="header-actions d-flex align-items-center gap-3">
          <!-- Profile Area with Full Name -->
          <div class="userProfileTarget"></div>
        </div>
      </header>

      <!-- Read-Only Banner (Hidden by default) -->
      <div id="shiftWarningBanner" class="alert alert-danger bg-danger bg-opacity-10 border-danger text-danger text-center glass-card fw-bold d-none mb-4 shadow-sm" style="box-shadow: 0 0 20px rgba(220, 53, 69, 0.2) !important;">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> OUTSIDE WORKING HOURS - DIRECTORY LOCKED
      </div>

      <!-- Control Bar -->
      <div class="glass-card p-3 mb-4 rounded-4">
        <div class="row g-3 align-items-center">
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="fa-solid fa-magnifying-glass"></i></span>
              <input type="text" id="searchDoctor" class="form-control bg-transparent text-light border-secondary" placeholder="Search by name or specialization...">
            </div>
          </div>
          <div class="col-md-4">
            <select id="filterSpecialization" class="form-select bg-transparent text-light border-secondary">
              <option value="all">All Specializations</option>
              <!-- Populated via JS -->
            </select>
          </div>
        </div>
      </div>

      <!-- Doctors Table -->
      <div class="glass-card p-4 flex-grow-1 rounded-4">
        <div class="table-responsive">
          <table class="table table-dark bg-transparent table-hover align-middle mb-0">
            <thead class="text-secondary" style="border-bottom: 2px solid rgba(255,255,255,0.1);">
              <tr>
                <th scope="col" style="width: 60px;">Photo</th>
                <th scope="col">Full Name</th>
                <th scope="col">Specialization</th>
                <th scope="col">Email</th>
                <th scope="col">License Number</th>
                <th scope="col">Status</th>
                <th scope="col" class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="doctorsTableBody">
              <!-- Dynamically populated via JS -->
            </tbody>
          </table>
        </div>
      </div>
      
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="receptionist-doctors.js"></script>
  <script src="../transitions.js"></script>


<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body></html>
