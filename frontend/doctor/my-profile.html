<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - My Profile</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="text-white min-vh-100 page-fade-in">

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
        <a href="my-schedule.html" class="nav-item">
          <i class="fa-regular fa-calendar-days"></i> My Schedule
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fa-regular fa-file-lines"></i> Reports
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Top Header -->
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-0 fw-bold text-main">My Profile</h2>
          <p class="text-muted mb-0">Update your account settings</p>
        </div>
        
        <div class="header-actions d-flex align-items-center gap-3">
          <div class="theme-switch-wrapper" id="global-theme-toggle" title="Toggle Dark/Light Mode">
            <div class="theme-switch">
              <div class="theme-switch-toggle">
                <i class="fa-solid fa-sun icon-sun"></i>
                <i class="fa-solid fa-moon icon-moon"></i>
              </div>
            </div>
          </div>
          <!-- Cleaned Up Avatar -->
          <a href="my-profile.html" class="text-decoration-none">
            <div class="user-avatar" id="user-avatar" title="My Profile"></div>
          </a>
        </div>
      </header>

      <!-- Profile Form -->
      <div class="row mt-4 mb-4">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card p-5 rounded-4 shadow-lg text-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="mb-0 fw-bold text-main"><i class="fa-solid fa-user-shield text-info me-2"></i>Profile Settings</h4>
            </div>
            
            <form id="profileForm">
              <div class="mb-4 text-center">
                <div class="user-avatar mb-3 mx-auto" style="width: 100px; height: 100px; font-size: 2.5rem;"></div>
                <input class="form-control bg-dark bg-opacity-50 text-white border-secondary rounded-pill" type="file" id="profileImage" accept="image/*">
                <small class="text-white-50 mt-2 d-block">Upload new avatar (Optional)</small>
              </div>

              <div class="mb-4">
                <label class="form-label text-white-50 small text-uppercase tracking-wider">Email Address</label>
                <input type="email" id="profileEmail" class="form-control bg-dark bg-opacity-50 text-white border-secondary rounded-pill px-4 py-2" required>
              </div>

              <div class="mb-5">
                <label class="form-label text-white-50 small text-uppercase tracking-wider">New Password</label>
                <input type="password" id="profilePassword" class="form-control bg-dark bg-opacity-50 text-white border-secondary rounded-pill px-4 py-2" placeholder="Leave blank to keep current password">
              </div>

              <button type="submit" class="btn btn-info w-100 rounded-pill fw-bold py-2" style="box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);">
                <i class="fa-solid fa-check me-2"></i>Save Changes
              </button>
            </form>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
</body>
</html>
