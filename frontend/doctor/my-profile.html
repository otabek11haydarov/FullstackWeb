<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile - CareTrack</title>
  
  <link rel="icon" href="../assets/logo.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  
  <style>
    .hover-glass:hover {
        background: rgba(255, 255, 255, 0.05);
    }
    .active-gradient-sidebar {
        background: linear-gradient(90deg, rgba(123, 47, 247, 0.2), rgba(241, 7, 163, 0.2));
        border-left: 4px solid var(--neon-purple);
    }
  </style>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="glass-body">

  <div class="d-flex" style="height: 100vh; overflow: hidden; background-color: var(--bg-dark);">
    
    <!-- Sidebar -->
    <nav class="glass-card d-flex flex-column p-3 m-3 rounded-4" style="width: 280px; height: calc(100vh - 48px);">
        <!-- Logo & Brand Name -->
        <div class="brand-logo mb-4 d-flex align-items-center gap-3 ps-2">
            <img src="../assets/logo.png" alt="Logo" width="40" class="rounded">
            <div class="d-flex flex-column">
                <span class="fw-bold text-light">CareTrack</span>
                <span class="small text-white-50">Clinic</span>
            </div>
        </div>
        
        <!-- Navigation -->
        <ul class="nav flex-column mb-auto gap-2">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my-schedule.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-calendar-alt"></i> My Schedule
                </a>
            </li>
            <li class="nav-item">
                <a href="my-patients.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-users"></i> My Patients
                </a>
            </li>
            <li class="nav-item">
                <a href="diagnoses.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-notes-medical"></i> Diagnoses
                </a>
            </li>
            <li class="nav-item">
                <a href="reports.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-chart-line"></i> Reports
                </a>
            </li>
        </ul>

        <!-- Logout -->
        <div class="mt-auto border-top border-secondary pt-3">
            <a href="../auth/login.html" id="logoutBtn" class="nav-link text-danger fw-bold d-flex align-items-center gap-3">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1 d-flex flex-column p-3 m-3 ms-0" style="overflow-y: auto;">
      
      <!-- Top Header -->
      <header class="d-flex justify-content-between align-items-center mb-4 glass-card p-3 rounded-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">My Profile</h2>
        
        <div class="header-actions d-flex align-items-center gap-3">
          <!-- Profile Area -->
          <a href="my-profile.html" class="text-light text-decoration-none d-flex align-items-center gap-2 custom-hover-effect">
            <div class="rounded-circle d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));">
              <span id="headerInitial" class="fw-bold text-white">D</span>
            </div>
            <span id="headerName" class="text-light fw-bold ms-2" style="font-size: 0.95rem;">Loading...</span>
          </a>
        </div>
      </header>

      <!-- Profile Content -->
      <div class="row g-4 flex-grow-1">
        <!-- Left Column: Avatar & Basic Info -->
        <div class="col-md-4">
          <div class="glass-card p-4 text-center d-flex flex-column align-items-center justify-content-center h-100 shadow-sm border-0">
            <div class="rounded-circle text-white d-flex align-items-center justify-content-center fw-bold display-4 mb-3 shadow-lg" id="profileAvatar" style="width: 150px; height: 150px; background: var(--primary-gradient);">
              D
            </div>
            <h3 class="fw-bold mb-2" id="profileName" style="color: var(--text-primary); text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);">Loading...</h3>
            <div class="mb-3 d-flex flex-column align-items-center">
              <span class="badge border border-primary text-primary rounded-pill mb-1 px-4 py-2 shadow-sm" style="font-size: 0.9rem; background: rgba(13, 110, 253, 0.1);">Doctor</span>
              <span id="docSpecialization" class="text-white-50 small">General Practice</span>
            </div>
            <p class="text-white-50" id="profileEmailDisplay">loading@example.com</p>
          </div>
        </div>

        <!-- Right Column: Account Settings Form -->
        <div class="col-md-8">
          <div class="glass-card p-4 shadow-sm border-0 h-100">
            <h4 class="mb-4 fw-bold" style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Account Settings</h4>
            
            <form id="profileForm">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">First Name</label>
                  <input type="text" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileFirstName" required="">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">Last Name</label>
                  <input type="text" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileLastName" required="">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">Email Address</label>
                  <input type="email" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileEmail" required="">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">Phone Number (Read-only)</label>
                  <input type="text" class="form-control bg-transparent text-white-50 border-secondary rounded-3" id="profilePhone" disabled="">
                </div>

                <div class="col-12 mt-4 text-end">
                  <button type="submit" class="btn rounded-pill px-5 py-2 fw-bold shadow-lg text-white" id="saveProfileBtn" style="background: var(--primary-gradient); border: none;">
                    Save Changes <i class="fa-solid fa-save ms-2"></i>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Toast Container -->
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="doctor-profile.js"></script>
  <script src="../transitions.js"></script>


</body></html>
