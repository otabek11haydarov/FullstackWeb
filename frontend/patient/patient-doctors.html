<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Find a Doctor</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    /* Patient Portal Specific Styles */
    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-secondary);
      border-radius: 20px;
      padding: 8px 16px;
      transition: all 0.3s ease;
    }
    .filter-btn.active {
      background: rgba(13, 202, 240, 0.2);
      border-color: #0dcaf0;
      color: #0dcaf0;
      box-shadow: 0 0 15px rgba(13, 202, 240, 0.4);
    }
    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }
    
    .doctor-card {
      background: rgba(30, 30, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .doctor-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      border-color: rgba(123, 47, 247, 0.5);
    }
    
    .time-slot {
      border: 1px solid #0dcaf0;
      color: #0dcaf0;
      background: transparent;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .time-slot:hover, .time-slot.selected {
      background: #0dcaf0;
      color: #000;
      box-shadow: 0 0 10px rgba(13, 202, 240, 0.6);
    }

    .rating-star {
      color: #ffd200;
    }

    .search-input {
      background: rgba(0,0,0,0.2) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: white !important;
      border-radius: 20px;
      padding-left: 40px;
    }
    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body class="text-white min-vh-100">

  <div class="app-container d-flex w-100 min-vh-100" style="background-color: #0f172a;">
    
    <div class="sidebar-backdrop" id="sidebarBackdrop">
        <button class="btn text-white mobile-close-btn d-lg-none" id="mobileCloseSidebar" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; z-index: 1060;"><i class="fas fa-times"></i></button></div>
    <div class="sidebar glass-sidebar d-flex flex-column p-3" style="width: 280px; min-height: 100vh; background: rgba(13, 15, 20, 0.7); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05);">
        <div class="logo-container mb-5 text-center mt-3 d-flex flex-column align-items-center justify-content-center">
            <img src="../assets/logo.png" alt="CareTrack Clinic Logo" class="img-fluid mb-2" style="max-height: 45px; object-fit: contain;">
            <span class="badge bg-info text-dark rounded-pill px-3 py-1 fw-bold" style="letter-spacing: 0.5px;">Patient Portal</span>
        </div>
        
        <ul class="nav nav-pills flex-column mb-auto gap-2">
            <li class="nav-item">
                <a href="patient-dashboard.html" class="nav-link text-secondary premium-hover"><i class="fas fa-home me-3"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="patient-doctors.html" class="nav-link text-secondary premium-hover"><i class="fas fa-user-md me-3"></i> Find a Doctor</a>
            </li>
            <li class="nav-item">
                <a href="patient-appointments.html" class="nav-link text-secondary premium-hover"><i class="fas fa-calendar-check me-3"></i> My Appointments</a>
            </li>
            <li class="nav-item">
                <a href="patient-records.html" class="nav-link text-secondary premium-hover"><i class="fas fa-file-medical me-3"></i> Medical Records</a>
            </li>
            <li class="nav-item">
                <a href="my-profile.html" class="nav-link text-secondary premium-hover"><i class="fas fa-user-circle me-3"></i> My Profile</a>
            </li>
        </ul>

        <div class="mt-auto border-top border-secondary pt-3 d-flex flex-column gap-2">
            <div class="userProfileTarget w-100"></div>
            <button id="sidebarLogoutBtn" class="btn btn-sm w-100 text-start px-3 py-2 d-flex align-items-center gap-2" style="background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.25); border-radius: 8px; color: #dc3545; font-weight: 500; transition: all 0.25s ease;" onmouseover="this.style.background='rgba(220,53,69,0.2)'" onmouseout="this.style.background='rgba(220,53,69,0.1)'">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <main class="main-content flex-grow-1 p-4 p-md-5 d-flex flex-column overflow-auto" style="height: 100vh; overflow-x: hidden;">
      <button id="mobileSidebarToggle" class="btn btn-outline-info d-lg-none mb-3" style="border-radius: 8px; width: fit-content;"><i class="fas fa-bars me-2"></i> Menu</button>
        
        <div class="d-flex flex-column flex-xl-row justify-content-between align-items-start align-items-xl-center mb-4 gap-3">
            <div>
                <h2 class="text-light fw-bold mb-1"><i class="fas fa-user-md text-info me-2"></i>Find a Doctor</h2>
                <p class="text-secondary mb-0">Book an appointment with our top specialists</p>
            </div>
            
            <div class="d-flex flex-wrap align-items-center gap-3">
                <div class="d-flex align-items-center bg-dark bg-opacity-50 px-3 py-2 rounded-pill border border-secondary border-opacity-25">
                    <i class="fas fa-calendar-alt text-info me-2"></i>
                    <input type="date" id="appointmentDatePicker" class="bg-transparent text-light border-0 shadow-none outline-none" style="color-scheme: dark; cursor: pointer;">
                </div>
                
                <div class="d-flex align-items-center bg-dark bg-opacity-50 px-3 py-2 rounded-pill border border-secondary border-opacity-25">
                    <i class="fas fa-search text-secondary me-2"></i>
                    <input type="text" id="doctorSearchInput" class="bg-transparent text-light border-0 shadow-none outline-none" placeholder="Search doctor...">
                </div>
            </div>
        </div>

        <div id="specialtyFilters" class="d-flex flex-wrap gap-2 mb-4 pb-2">
        </div>

        <div id="doctorsGrid" class="row g-4 mb-5">
        </div>

  <!-- Booking Modal -->
  <div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-card" style="background: rgba(20, 25, 35, 0.95); border: 1px solid rgba(13, 202, 240, 0.2);">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title fw-bold text-light"><i class="fa-solid fa-calendar-plus text-neon-cyan me-2"></i>Confirm Appointment</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-light">
          <p class="mb-2">Booking with <span class="fw-bold text-info" id="modalDoctorName"></span></p>
          <p class="mb-4">Time: <span class="badge bg-primary text-dark fw-bold px-3 py-2" id="modalDateTime"></span></p>
          
          <div class="mb-3">
            <label for="bookingReason" class="form-label text-white-50">Reason for Visit (Required)</label>
            <textarea class="form-control search-input" id="bookingReason" rows="3" placeholder="Briefly describe your symptoms or reason for visit..." required></textarea>
          </div>
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-info text-dark fw-bold px-4" id="confirmBookingBtn">Confirm Booking</button>
        </div>
      </div>
    </div>
  </div>
      
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="../transitions.js"></script>
  <script src="patient-doctors.js"></script>
</body>
</html>
