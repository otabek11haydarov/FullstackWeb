<!DOCTYPE html><html lang="en" data-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Doctor Diagnoses</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  
  
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="text-white min-vh-100">

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item active">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
        <a href="my-schedule.html" class="nav-item">
          <i class="fa-regular fa-calendar-days"></i> My Schedule
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fa-regular fa-file-lines"></i> Reports
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Top Header -->
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">All Diagnoses</h2>
          <p class="text-white-50 mb-0">Record of conditions for your assigned patients</p>
        </div>
        <div class="header-actions d-flex align-items-center gap-3">
          
          <div class="userProfileTarget"></div>
        </div>
      </header>

      <!-- Glassmorphism Table -->
      <div class="glass-table table-responsive">
        <table class="table table-borderless align-middle mb-0" style="color: var(--text-main);">
          <thead>
            <tr style="border-bottom: 1px solid var(--border-color);">
              <th class="py-3">Date</th>
              <th class="py-3">Patient Name</th>
              <th class="py-3">Condition</th>
              <th class="py-3">Severity</th>
              <th class="py-3">Prescription/Notes</th>
              <th class="text-end py-3">Action</th>
            </tr>
          </thead>
          <tbody id="diagnosesTableBody">
            <tr>
              <td colspan="6" class="text-center py-5">
                <div class="spinner-border text-info" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
  <script src="diagnoses.js"></script>


<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body></html>
