<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patients Management - Receptionist</title>
  
  <script src="../theme-init.js"></script>
  <link rel="icon" href="../assets/logo.png">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  
  <style>
    /* Custom Styling for the Receptionist Patients */
    .locked-action {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(80%);
      pointer-events: none;
    }
    .active-gradient-sidebar { background: linear-gradient(90deg, #7b2ff7, #ff007f) !important; color: white !important; }
    .hover-glass:hover { background: rgba(255,255,255,0.05); color: white !important; }
  </style>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="glass-body">

  <div class="d-flex" style="height: 100vh; overflow: hidden; background-color: var(--bg-dark);">
    
    <!-- Sidebar -->
    <nav class="glass-card d-flex flex-column p-3 m-3 rounded-4" style="width: 280px; height: calc(100vh - 48px);">
        <!-- Logo & Brand Name -->
        <div class="brand-logo mb-4 d-flex align-items-center gap-3 ps-2">
            <img src="../assets/logo.png" alt="Logo" width="40" class="rounded">
            <div class="d-flex flex-column">
                <span class="fw-bold text-light">CareTrack</span>
                <span class="small text-white-50">Clinic</span>
            </div>
        </div>
        
        <!-- Navigation -->
        <ul class="nav flex-column mb-auto gap-2">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-th-large"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="appointments.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-calendar-check"></i> Appointments
                </a>
            </li>
            <li class="nav-item">
                <a href="doctors.html" class="nav-link text-secondary rounded-3 d-flex align-items-center gap-3 hover-glass">
                    <i class="fas fa-user-md"></i> Doctors
                </a>
            </li>
            <li class="nav-item">
                <a href="patients.html" class="nav-link text-white active-gradient-sidebar rounded-3 d-flex align-items-center gap-3">
                    <i class="fas fa-users"></i> Patients
                </a>
            </li>
        </ul>

        <!-- Logout -->
        <div class="mt-auto border-top border-secondary pt-3">
            <a href="../auth/login.html" id="logoutBtn" class="nav-link text-danger fw-bold d-flex align-items-center gap-3">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1 d-flex flex-column p-3 m-3 ms-0" style="overflow-y: auto;">
      
      <!-- Top Header -->
      <header class="d-flex justify-content-between align-items-center mb-4 glass-card p-3 rounded-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">Patients Registry</h2>
        
        <div class="header-actions d-flex align-items-center gap-3">
          <!-- Profile Area with Full Name -->
          <div class="userProfileTarget"></div>
        </div>
      </header>

      <!-- Read-Only Banner (Hidden by default) -->
      <div id="shiftWarningBanner" class="alert alert-danger bg-danger bg-opacity-10 border-danger text-danger text-center glass-card fw-bold d-none mb-4 shadow-sm" style="box-shadow: 0 0 20px rgba(220, 53, 69, 0.2) !important;">
        <i class="fa-solid fa-triangle-exclamation me-2"></i> OUTSIDE WORKING HOURS - READ-ONLY MODE
      </div>

      <!-- Control Bar -->
      <div class="glass-card p-3 mb-4 rounded-4">
        <div class="row g-3 align-items-center">
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="fa-solid fa-magnifying-glass"></i></span>
              <input type="text" id="searchPatient" class="form-control bg-transparent text-light border-secondary" placeholder="Search by name, email, or phone...">
            </div>
          </div>
          <div class="col-md-3">
            <select id="filterDoctor" class="form-select bg-transparent text-light border-secondary">
              <option value="all">All Doctors</option>
              <!-- Populated via JS -->
            </select>
          </div>
          <div class="col-md-4 text-end">
            <button id="btnAddPatient" class="btn btn-info fw-bold text-dark px-4 rounded-pill action-button" data-bs-toggle="modal" data-bs-target="#patientModal">
              <i class="fa-solid fa-user-plus me-1"></i> Add New Patient
            </button>
          </div>
        </div>
      </div>

      <!-- Patients Table -->
      <div class="glass-card p-4 flex-grow-1 rounded-4">
        <div class="table-responsive">
          <table class="table table-dark bg-transparent table-hover align-middle mb-0">
            <thead class="text-secondary" style="border-bottom: 2px solid rgba(255,255,255,0.1);">
              <tr>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col">Phone</th>
                <th scope="col">Age / DOB</th>
                <th scope="col">Gender</th>
                <th scope="col">Assigned Doctor</th>
                <th scope="col" class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="patientsTableBody">
              <!-- Dynamically populated via JS -->
            </tbody>
          </table>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Patient Modal -->
  <div class="modal fade" id="patientModal" tabindex="-1" aria-labelledby="patientModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content glass-card rounded-4 border-0" style="background-color: var(--bg-card); backdrop-filter: blur(20px);">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title text-light fw-bold" id="patientModalLabel">Manage Patient</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="patientForm">
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label text-secondary small">First Name</label>
                <input type="text" class="form-control bg-transparent text-light border-secondary" id="patientFirstName" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label text-secondary small">Last Name</label>
                <input type="text" class="form-control bg-transparent text-light border-secondary" id="patientLastName" required="">
              </div>
            </div>
            
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label text-secondary small">Email</label>
                <input type="email" class="form-control bg-transparent text-light border-secondary" id="patientEmail" required="">
              </div>
              <div class="col-md-6">
                <label class="form-label text-secondary small">Password (Leave blank to keep current)</label>
                <input type="password" class="form-control bg-transparent text-light border-secondary" id="patientPassword">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label text-secondary small">Date of Birth</label>
                <input type="date" class="form-control bg-transparent text-light border-secondary" id="patientDOB" required="">
              </div>
              <div class="col-md-4">
                <label class="form-label text-secondary small">Gender</label>
                <select class="form-select bg-transparent text-light border-secondary" id="patientGender" required="">
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label text-secondary small">Phone Number</label>
                <input type="text" class="form-control bg-transparent text-light border-secondary" id="patientPhone">
              </div>
            </div>

            <!-- New Medical Fields -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label text-secondary small">Blood Type</label>
                <select class="form-select bg-transparent text-light border-secondary" id="patientBloodType">
                  <option value="">Unknown</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label text-secondary small">Allergies (comma separated)</label>
                <input type="text" class="form-control bg-transparent text-light border-secondary" id="patientAllergies" placeholder="e.g. Penicillin, Peanuts">
              </div>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label text-secondary small">Chronic Conditions</label>
                <textarea class="form-control bg-transparent text-light border-secondary" id="patientChronic" rows="2" placeholder="e.g. Asthma, Diabetes"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label text-secondary small">Medical History</label>
                <textarea class="form-control bg-transparent text-light border-secondary" id="patientHistory" rows="2" placeholder="Brief medical history..."></textarea>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label text-secondary small">Assigned Doctor (Optional)</label>
              <select class="form-select bg-transparent text-light border-secondary" id="patientDoctorId">
                <option value="">None</option>
                <!-- Populated via JS -->
              </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-info fw-bold text-dark rounded-pill px-4">Save Patient</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="receptionist-patients.js"></script>
  <script src="../transitions.js"></script>


</body></html>
