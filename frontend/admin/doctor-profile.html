<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Doctor Profile</title>
  
  <script src="../theme-init.js"></script>
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    .schedule-grid {
      display: grid;
      grid-template-columns: 80px repeat(7, 1fr);
      gap: 5px;
      margin-top: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 10px;
    }
    .schedule-header {
      text-align: center;
      color: var(--text-muted);
      font-weight: 600;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }
    .schedule-row {
      display: contents;
    }
    .schedule-time {
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--border-color);
      padding-right: 10px;
      font-weight: 500;
    }
    .schedule-cell {
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      height: 45px;
      position: relative;
    }
    .lunch-break {
      background: repeating-linear-gradient(
        45deg,
        rgba(0,0,0,0.05),
        rgba(0,0,0,0.05) 10px,
        rgba(0,0,0,0.1) 10px,
        rgba(0,0,0,0.1) 20px
      ) !important;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      pointer-events: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    [data-theme="dark"] .lunch-break {
      background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 10px,
        rgba(255,255,255,0.05) 10px,
        rgba(255,255,255,0.05) 20px
      ) !important;
    }
    .pill {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 24px;
      border-radius: 12px;
      width: 90%;
      left: 5%;
      font-size: 0.7rem;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .pill.scheduled { background: var(--primary-gradient); }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header d-flex align-items-center">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h4 class="mb-0 fw-bold">CareTrack Clinic</h4>
      </div>
      
      <ul class="nav flex-column sidebar-nav mt-4">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="admins.html"><i class="fa-solid fa-user-shield"></i> Admins</a></li>
        <li class="nav-item"><a class="nav-link active" href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="patients.html"><i class="fa-solid fa-users"></i> Patients</a></li>
      </ul>
      
      <div class="mt-auto p-3 text-center">
        <a href="doctors.html" class="btn btn-outline-secondary rounded-pill w-100">Back to Directory</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">Doctor Profile</h2>
      </header>

      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="glass-card p-4 text-center h-100">
            <div class="avatar rounded-circle mx-auto mb-3 text-white d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 2rem; background: var(--primary-gradient);" id="docAvatar">D</div>
            <h4 class="fw-bold mb-1" id="docName">Loading...</h4>
            <p class="text-muted mb-3" id="docSpec">...</p>
            <hr>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">Email</span>
              <span id="docEmail" class="fw-medium">...</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span class="text-muted">License</span>
              <span id="docLicense" class="fw-medium">...</span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted">Experience</span>
              <span id="docExperience" class="fw-medium">...</span>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="glass-card p-4 h-100">
            <h5 class="fw-bold mb-3">Assigned Patients</h5>
            <div class="row g-3" id="assignedPatientsList">
              <div class="col-12 text-center text-muted py-3">Loading patients...</div>
            </div>
          </div>
        </div>
      </div>

      <div class="glass-card p-4">
        <h5 class="fw-bold mb-3">Work Schedule (Mon-Sun, 08:00 - 20:00)</h5>
        <div class="schedule-grid" id="scheduleGrid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </main>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="doctor-profile.js"></script>
</body>
</html>
