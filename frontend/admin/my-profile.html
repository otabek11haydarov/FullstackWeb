<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Admin Profile</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="glass-body">

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header d-flex align-items-center">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h4 class="mb-0 fw-bold">CareTrack Clinic</h4>
      </div>
      
      <ul class="nav flex-column sidebar-nav mt-4">
        <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-border-all"></i> Dashboard</a></li>
        <li class="nav-item" id="nav-admins-link"><a class="nav-link" href="admins.html"><i class="fa-solid fa-user-shield"></i> Admins</a></li>
        <li class="nav-item"><a class="nav-link" href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="patients.html"><i class="fa-solid fa-users"></i> Patients</a></li>
        <li class="nav-item"><a class="nav-link" href="receptionists.html"><i class="fa-solid fa-desktop"></i> Receptionists</a></li>
        <li class="nav-item"><a class="nav-link" href="diagnoses.html"><i class="fa-solid fa-stethoscope"></i> Diagnoses</a></li>
        <li class="nav-item"><a class="nav-link" href="appointments.html"><i class="fa-regular fa-calendar-check"></i> Appointments</a></li>
        <li class="nav-item mt-4"><a class="nav-link" href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket text-danger"></i> <span class="text-danger">Logout</span></a></li>
      </ul>

      <div class="sidebar-footer mt-auto p-3">
        <div class="userProfileTarget"></div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header -->
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">My Profile</h2>
        <div class="header-actions d-flex align-items-center gap-3">
          
          
          <a href="my-profile.html" class="text-light text-decoration-none d-flex align-items-center gap-2 custom-hover-effect">
            <div class="rounded-circle d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));">
              <i class="fas fa-user text-white"></i>
            </div>
          </a>
        </div>
      </header>

      <!-- Profile Content -->
      <div class="row g-4">
        <!-- Left Column: Avatar & Basic Info -->
        <div class="col-md-4">
          <div class="glass-card p-4 text-center d-flex flex-column align-items-center justify-content-center h-100 shadow-sm border-0">
            <div class="avatar-lg rounded-circle text-white d-flex align-items-center justify-content-center fw-bold display-4 mb-3 shadow-lg" id="profileAvatar" style="width: 150px; height: 150px; background: var(--primary-gradient);">
              A
            </div>
            <h3 class="fw-bold mb-2" id="profileName" style="color: var(--text-primary); text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);">Admin Name</h3>
            <div class="mb-3">
              <span class="badge bg-danger bg-gradient rounded-pill px-4 py-2 fw-bold shadow-sm" id="profileRoleBadge" style="font-size: 0.9rem;">Super Admin</span>
            </div>
            <p class="text-muted" id="profileEmailDisplay">admin@example.com</p>
          </div>
        </div>

        <!-- Right Column: Account Settings Form -->
        <div class="col-md-8">
          <div class="glass-card p-4 shadow-sm border-0 h-100">
            <h4 class="mb-4 fw-bold" style="color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Account Settings</h4>
            
            <form id="profileForm">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">First Name</label>
                  <input type="text" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileFirstName" required="">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">Last Name</label>
                  <input type="text" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileLastName" required="">
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">Email Address</label>
                  <input type="email" class="form-control bg-transparent text-light border-secondary rounded-3" id="profileEmail" required="">
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold" style="color: var(--text-secondary);">New Password</label>
                  <input type="password" class="form-control bg-transparent text-light border-secondary rounded-3" id="profilePassword" placeholder="Leave blank to keep current password">
                  <small class="text-muted mt-1 d-block"><i class="fa-solid fa-circle-info me-1"></i>Requires re-login if changed.</small>
                </div>
                <div class="col-12 mt-4 text-end">
                  <button type="submit" class="btn btn-primary-gradient rounded-pill px-5 py-2 fw-bold shadow-lg text-white" id="saveProfileBtn">
                    Save Changes <i class="fa-solid fa-save ms-2"></i>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Toast Container -->
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="my-profile.js"></script>
  <script src="../transitions.js"></script>


<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</body></html>
