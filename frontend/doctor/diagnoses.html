<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Doctor Diagnoses</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root {
      --neon-cyan: #00f5ff;
      --neon-purple: #7b2ff7;
      --neon-pink: #f107a3;
      --bg-dark: #12121a;
      --glass-panel: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      background: radial-gradient(circle at 20% 50%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 40%),
                  var(--bg-dark);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
      padding: 1.5rem;
      gap: 1.5rem;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--glass-panel);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
      padding-left: 1rem;
    }

    .nav-item {
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .nav-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(123, 47, 247, 0.15), transparent);
      color: #e2b4ff;
      border-left: 3px solid var(--neon-purple);
      box-shadow: -5px 0 15px rgba(123, 47, 247, 0.2);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
    /* Severe/Critical Badge styling */
    .badge-critical { background: rgba(241, 7, 163, 0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); }
    .badge-high { background: rgba(255, 69, 0, 0.1); color: #ff4500; border: 1px solid #ff4500; }
    .badge-medium { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid #ffc107; }
    .badge-low { background: rgba(0, 245, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item active">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
        <a href="#" class="nav-item">
          <i class="fa-regular fa-file-lines"></i> Reports
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Top Header -->
      <header class="top-header d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-0 fw-bold" style="color: var(--text-primary);">All Diagnoses</h2>
          <p class="text-white-50 mb-0">Record of conditions for your assigned patients</p>
        </div>
        <div class="header-actions d-flex align-items-center gap-3">
          <div class="theme-switch-wrapper" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <div class="theme-switch">
              <div class="theme-switch-toggle">
                <i class="fa-solid fa-sun icon-sun"></i>
                <i class="fa-solid fa-moon icon-moon"></i>
              </div>
            </div>
          </div>
          <div class="user-avatar" id="user-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan)); display: none;"></div>
        </div>
      </header>

      <!-- Glassmorphism Table -->
      <div class="glass-table table-responsive">
        <table class="table table-borderless align-middle mb-0" style="color: var(--text-main);">
          <thead>
            <tr style="border-bottom: 1px solid var(--border-color);">
              <th class="py-3">Date</th>
              <th class="py-3">Patient Name</th>
              <th class="py-3">Condition</th>
              <th class="py-3">Severity</th>
              <th class="py-3">Prescription/Notes</th>
              <th class="text-end py-3">Action</th>
            </tr>
          </thead>
          <tbody id="diagnosesTableBody">
            <tr>
              <td colspan="6" class="text-center py-5">
                <div class="spinner-border text-info" role="status"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
  <script src="diagnoses.js"></script>
</body>
</html>
