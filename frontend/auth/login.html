<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Login</title>
  <!-- Theme Init (Must be first to prevent flash) -->
  <script src="../theme-init.js"></script>
  <!-- Favicon -->
  <link rel="icon" href="../assets/logo.png">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Global CSS -->
  <link rel="stylesheet" href="../global.css">
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .theme-switch-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      z-index: 1;
    }
    .logo-text {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      font-size: 28px;
      text-align: center;
      margin-bottom: 30px;
    }
    
    /* Input overrides for Glassmorphism */
    .form-control {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      backdrop-filter: blur(5px);
    }
    .form-control:focus {
      background: transparent;
      color: var(--text-main);
      border-color: var(--primary-solid);
      box-shadow: 0 0 0 0.25rem rgba(123, 47, 247, 0.25);
    }
  </style>
</head>
<body class="glass-body">

  <!-- Floating Blobs -->
  <div class="blob blob-primary" style="top: -10%; left: -10%;"></div>
  <div class="blob blob-secondary" style="bottom: -10%; right: -10%;"></div>

  <!-- Theme Switcher -->
  <div class="theme-switch-container">
    <div class="theme-switch-wrapper" onclick="toggleTheme()">
      <div class="theme-switch">
        <div class="theme-switch-toggle">
          <i class="fa-solid fa-sun icon-sun"></i>
          <i class="fa-solid fa-moon icon-moon"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="login-wrapper glass-card form-enter">
    <div class="text-center">
      <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 60px; height: 60px; border-radius: 12px; margin-bottom: 10px;" class="shadow-sm">
    </div>
    <div class="logo-text">CareTrack Clinic</div>
    <h5 class="text-center mb-4" style="color: var(--text-main);">Sign in to your account</h5>
    
    <div id="alert-box" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label" style="color: var(--text-muted);">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-muted);"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" class="form-control border-start-0" id="email" required placeholder="name@example.com">
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label" style="color: var(--text-muted);">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color); color: var(--text-muted);"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control border-start-0" id="password" required placeholder="Enter password" oninput="checkPasswordStrength(this.value)">
        </div>
        <div class="password-strength-container">
          <div class="password-strength-bar" id="strengthBar"></div>
        </div>
        <small class="text-muted mt-1 d-block" id="strengthText"></small>
      </div>
      
      <button type="submit" class="btn btn-primary-gradient w-100 py-2 fw-semibold fs-5">Login</button>
      
      <div class="text-center mt-4">
        <span style="color: var(--text-muted);">New patient?</span> <a href="register.html" style="color: var(--primary-solid); text-decoration: none; font-weight: 500;">Register here</a>
      </div>
    </form>
  </div>

  <script>
    // Password Strength Logic
    function checkPasswordStrength(password) {
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let strength = 0;
      
      if (password.length > 0) strength += 1;
      if (password.length > 5) strength += 1;
      if (/[A-Z]/.test(password)) strength += 1;
      if (/[0-9]/.test(password)) strength += 1;
      if (/[^A-Za-z0-9]/.test(password)) strength += 1;

      switch(strength) {
        case 0:
          bar.style.width = '0%';
          text.textContent = '';
          break;
        case 1:
        case 2:
          bar.style.width = '33%';
          bar.style.backgroundColor = '#dc3545';
          text.textContent = 'Weak';
          text.style.color = '#dc3545';
          break;
        case 3:
        case 4:
          bar.style.width = '66%';
          bar.style.backgroundColor = '#ffc107';
          text.textContent = 'Moderate';
          text.style.color = '#ffc107';
          break;
        case 5:
          bar.style.width = '100%';
          bar.style.backgroundColor = '#198754';
          text.textContent = 'Strong';
          text.style.color = '#198754';
          break;
      }
    }

    // Auth Logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alert-box');
      
      // Submit animation feedback
      const btn = e.target.querySelector('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
      btn.disabled = true;

      try {
        const response = await fetch('http://localhost:8000/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        console.log('Login Response:', data);

        if (response.ok) {
          localStorage.setItem('token', data.token);
          
          // Safely access the user object depending on backend structure
          const userObj = data.data && data.data.user ? data.data.user : data;
          localStorage.setItem('user', JSON.stringify(userObj));

          const userRole = userObj.role || data.role;
          
          if (userRole === 'Admin' || userRole === 'Super Admin') {
            window.location.href = '../admin/index.html';
          } else if (userRole === 'Doctor') {
            window.location.href = '../doctor/dashboard.html';
          } else if (userRole === 'Receptionist') {
            window.location.href = '../receptionist/index.html';
          } else if (userRole === 'Patient') {
            window.location.href = '../patient/index.html';
          } else {
            // Fallback
            window.location.href = '../index.html';
          }
        } else {
          alertBox.textContent = data.message || 'Login failed';
          alertBox.classList.remove('d-none');
          btn.innerHTML = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        console.error('Login error:', err);
        alertBox.textContent = 'An error occurred. Please try again later.';
        alertBox.classList.remove('d-none');
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
