<!DOCTYPE html><html lang="en" data-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Record Management System - My Patients</title>
  
  <script src="../theme-init.js"></script>
  <script src="js/theme.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link rel="stylesheet" href="../global.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/animations/scale-subtle.css">
</head>
<body class="text-white min-vh-100">

  <div class="app-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/logo.png" alt="CareTrack Logo" style="width: 32px; height: 32px; border-radius: 8px;" class="me-2 shadow-sm">
        <h5 class="mb-0 fw-bold">CareTrack Clinic</h5>
      </div>

      <nav>
        <a href="dashboard.html" class="nav-item">
          <i class="fa-solid fa-border-all"></i> Dashboard
        </a>
        <a href="my-patients.html" class="nav-item active">
          <i class="fa-regular fa-user"></i> My Patients
        </a>
        <a href="diagnoses.html" class="nav-item">
          <i class="fa-solid fa-file-medical"></i> Diagnoses
        </a>
        <a href="my-schedule.html" class="nav-item">
          <i class="fa-regular fa-calendar-days"></i> My Schedule
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fa-regular fa-file-lines"></i> Reports
        </a>
      </nav>
      
      <div class="mt-auto">
        <a href="#" id="logoutBtn" class="nav-item text-danger">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div class="header">
        <div>
          <h3 class="mb-1 fw-bold">My Patients</h3>
          <p style="color: rgba(255,255,255,0.6);">Directory of your assigned patients</p>
        </div>
        <div class="header-controls d-flex gap-3 align-items-center">
          <input type="text" id="patientSearch" class="form-control bg-transparent text-light border-secondary rounded-pill px-4" placeholder="Search patients by name..." style="min-width: 250px;">
          
          <!-- Global Theme Toggle -->
          
          
          <div class="userProfileTarget"></div>
        </div>
      </div>

      <div class="row g-4" id="patientsContainer">
        <!-- Loader -->
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-info" role="status"></div>
        </div>
      </div>
      
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../transitions.js"></script>
  <script src="my-patients.js"></script>


</body></html>
