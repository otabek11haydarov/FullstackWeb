<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareTrack Clinic - Medical Records</title>
  
  <script src="../theme-init.js"></script>
  
  <link rel="icon" href="../assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../global.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Timeline specific styles */
    .timeline {
      position: relative;
      margin: 20px auto;
      padding: 0;
      list-style: none;
    }
    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 20px;
      width: 4px;
      background: linear-gradient(to bottom, #8a2be2, #0dcaf0);
      border-radius: 4px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 40px;
      padding-left: 60px;
    }
    .timeline-icon {
      position: absolute;
      left: 7px;
      top: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1e1e2d;
      border: 3px solid #0dcaf0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(13, 202, 240, 0.5);
      z-index: 1;
    }
    .timeline-content {
      background: rgba(30, 30, 45, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }
    .timeline-content::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 10px;
      border-width: 10px 10px 10px 0;
      border-style: solid;
      border-color: transparent rgba(30, 30, 45, 0.6) transparent transparent;
    }
    .timeline-header {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grid-2-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .review-box {
      margin-top: 15px;
      background: rgba(0, 0, 0, 0.2);
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #8a2be2;
    }
    
    .rating-star {
      color: #ffd200;
      cursor: pointer;
    }
    .rating-star.inactive {
      color: #444;
    }
    
    .btn-glow {
      background: linear-gradient(135deg, #0dcaf0, #8a2be2);
      border: none;
      color: white;
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
      transition: all 0.3s;
    }
    .btn-glow:hover {
      box-shadow: 0 0 25px rgba(13, 202, 240, 0.7);
      transform: scale(1.02);
      color: white;
    }
  </style>
</head>
<body class="text-white min-vh-100">

  <div class="app-container">
    
    <div class="sidebar-backdrop" id="sidebarBackdrop">
        <button class="btn text-white mobile-close-btn d-lg-none" id="mobileCloseSidebar" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; z-index: 1060;"><i class="fas fa-times"></i></button></div>
    <div class="sidebar glass-sidebar d-flex flex-column p-3" style="width: 280px; min-height: 100vh; background: rgba(13, 15, 20, 0.7); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05);">
        <div class="logo-container mb-5 text-center mt-3 d-flex flex-column align-items-center justify-content-center">
            <img src="../assets/logo.png" alt="CareTrack Clinic Logo" class="img-fluid mb-2" style="max-height: 45px; object-fit: contain;">
            <span class="badge bg-info text-dark rounded-pill px-3 py-1 fw-bold" style="letter-spacing: 0.5px;">Patient Portal</span>
        </div>
        
        <ul class="nav nav-pills flex-column mb-auto gap-2">
            <li class="nav-item">
                <a href="patient-dashboard.html" class="nav-link text-secondary premium-hover"><i class="fas fa-home me-3"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="patient-doctors.html" class="nav-link text-secondary premium-hover"><i class="fas fa-user-md me-3"></i> Find a Doctor</a>
            </li>
            <li class="nav-item">
                <a href="patient-appointments.html" class="nav-link text-secondary premium-hover"><i class="fas fa-calendar-check me-3"></i> My Appointments</a>
            </li>
            <li class="nav-item">
                <a href="patient-records.html" class="nav-link text-secondary premium-hover"><i class="fas fa-file-medical me-3"></i> Medical Records</a>
            </li>
            <li class="nav-item">
                <a href="my-profile.html" class="nav-link text-secondary premium-hover"><i class="fas fa-user-circle me-3"></i> My Profile</a>
            </li>
        </ul>

        <div class="mt-auto border-top border-secondary pt-3 d-flex flex-column gap-2">
            <div class="userProfileTarget w-100"></div>
            <button id="sidebarLogoutBtn" class="btn btn-sm w-100 text-start px-3 py-2 d-flex align-items-center gap-2" style="background: rgba(220,53,69,0.1); border: 1px solid rgba(220,53,69,0.25); border-radius: 8px; color: #dc3545; font-weight: 500; transition: all 0.25s ease;" onmouseover="this.style.background='rgba(220,53,69,0.2)'" onmouseout="this.style.background='rgba(220,53,69,0.1)'">
              <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <main class="main-content">
      <button id="mobileSidebarToggle" class="btn btn-outline-info d-lg-none mb-3" style="border-radius: 8px; width: fit-content;"><i class="fas fa-bars me-2"></i> Menu</button>
      <div class="header d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1"><i class="fa-solid fa-file-waveform text-neon-cyan me-2"></i>Patient Medical Records</h2>
          <p class="text-white-50 mb-0">Your complete clinical history and appointments</p>
        </div>
        <div>
            <button class="btn btn-glow px-4 py-2 fw-bold" onclick="downloadReport()">
                <i class="fa-solid fa-file-pdf me-2"></i> Download Medical Report PDF
            </button>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-10 col-xl-8">
            <ul class="timeline" id="recordsTimeline">
                <!-- Timeline items injected via JS -->
            </ul>
        </div>
      </div>
      
    </main>
  </div>

  <!-- Review Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content glass-panel" style="background: #1e1e2d; border: 1px solid #333;">
        <div class="modal-header border-secondary">
          <h5 class="modal-title text-light fw-bold">Submit Anonymous Review</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="reviewForm">
            <input type="hidden" id="reviewApptId">
            <div class="text-center mb-4">
                <p class="text-white-50 mb-2">How was your visit?</p>
                <div id="starRatingContainer" class="fs-1">
                    <i class="fa-solid fa-star rating-star inactive" data-val="1"></i>
                    <i class="fa-solid fa-star rating-star inactive" data-val="2"></i>
                    <i class="fa-solid fa-star rating-star inactive" data-val="3"></i>
                    <i class="fa-solid fa-star rating-star inactive" data-val="4"></i>
                    <i class="fa-solid fa-star rating-star inactive" data-val="5"></i>
                </div>
                <input type="hidden" id="reviewRating" value="0">
            </div>
            <div class="mb-3">
              <label class="form-label text-white-50">Additional Comments (Optional)</label>
              <textarea class="form-control bg-dark text-light border-secondary" id="reviewComment" rows="3" placeholder="Share your experience..."></textarea>
            </div>
            <button type="submit" class="btn btn-neon-cyan w-100 fw-bold">Submit Review</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="../transitions.js"></script>
  <script src="patient-records.js"></script>
</body>
</html>
